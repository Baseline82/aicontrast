name: AIcontrast — Daily Tool Discovery

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print results but do not insert into DB)'
        required: false
        default: 'false'
        type: boolean

jobs:
  discover:
    name: Discover New AI Tools
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run discovery script
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
        run: node discover.js
